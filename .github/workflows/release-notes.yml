name: Release notes

on:
  release:
    types: [published, edited]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release notes
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: node scripts/validate-release-notes.js --env RELEASE_BODY
